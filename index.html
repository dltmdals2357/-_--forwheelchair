<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>휠체어 접근성 3D 시뮬레이션 - 실내 지하철역</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; }
        #ui-layer {
            position: absolute; top: 10px; left: 10px;
            color: white; font-family: sans-serif; pointer-events: none;
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; z-index: 10;
        }
        #ui-layer h3 {
            margin-top: 0; margin-bottom: 15px;
            color: #ffcc00; font-size: 1.1em;
            border-bottom: 1px solid #555; padding-bottom: 10px;
        }
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: white; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            font-family: sans-serif; cursor: pointer; z-index: 20;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 6px; height: 6px; background: rgba(255,255,255,0.7); border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 15;
        }
        #lock-indicator {
            display: none;
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%);
            color: white; font-family: sans-serif; font-weight: bold;
            padding: 12px 24px; border-radius: 30px; z-index: 15;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            font-size: 1.1em;
            animation: pulse 0.5s infinite alternate;
        }
        @keyframes pulse {
            from { transform: translateX(-50%) scale(1); }
            to { transform: translateX(-50%) scale(1.05); }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="start-screen">
        <h2>지하철역 휠체어 리프트/경사로 시뮬레이션</h2>
        <p>화면을 클릭하여 역내로 진입하세요 (오디오 활성화).</p>
        <p style="font-size: 0.9em; color: #888;">종료하려면 ESC 키를 누르세요.</p>
    </div>
    
    <div id="ui-layer">
        <h3>🚇 실내 지하철역 휠체어 시뮬레이션</h3>
        <p><b>W, A, S, D:</b> 이동</p>
        <p><b>마우스:</b> 시점 회전</p>
        <p><b>Space Bar:</b> 🔓 잠금장치 해제 (미끄러져 내려가기)</p>
        <hr style="border-color: #555;">
        <p><b>우측 경사로 (진회색):</b> 오르막 (안전락 작동)</p>
        <p><b>좌측 경사로 (진회색):</b> 내리막 (안전락 작동)</p>
    </div>
    
    <div id="crosshair"></div>
    <div id="lock-indicator">🔒 안전 고정장치 체결됨</div>

    <script>
        // 1. Scene & Camera Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        scene.fog = new THREE.Fog(0x111111, 5, 25);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.2, 5);
        camera.rotation.order = 'YXZ';

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // 2. 지하철역 실내 조명 세팅
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);
        
        const lightZPositions = [5, 0, -5, -10];
        lightZPositions.forEach((z) => {
            const pointLight = new THREE.PointLight(0xfffae6, 0.6, 15);
            pointLight.position.set(0, 4.5, z);
            pointLight.castShadow = true;
            scene.add(pointLight);

            const lampGeo = new THREE.BoxGeometry(2, 0.05, 0.3);
            const lampMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const lamp = new THREE.Mesh(lampGeo, lampMat);
            lamp.position.set(0, 4.9, z);
            scene.add(lamp);
        });

        // 3. 현실적인 무채색/질감 마테리얼 설정
        const matGround = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.9 });
        const matStair = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.9 });
        const matRamp = new THREE.MeshStandardMaterial({ color: 0x6a6a6a, roughness: 1.0 }); 
        
        const matWall = new THREE.MeshStandardMaterial({ color: 0xd9d9d9, roughness: 0.8 });
        const matCeiling = new THREE.MeshStandardMaterial({ color: 0xbbbbbb, roughness: 1.0 });
        const matRail = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.7, roughness: 0.3 });

        // 바닥 평지
        const ground = new THREE.Mesh(new THREE.BoxGeometry(20, 0.1, 20), matGround);
        ground.position.set(0, -0.05, 5);
        ground.receiveShadow = true;
        scene.add(ground);

        const topGround = new THREE.Mesh(new THREE.BoxGeometry(20, 0.1, 20), matGround);
        topGround.position.set(0, 2, -15);
        topGround.receiveShadow = true;
        scene.add(topGround);

        // 중앙 계단
        for(let i=0; i<4; i++) {
            const step = new THREE.Mesh(new THREE.BoxGeometry(4, 0.5, 1.25), matStair);
            step.position.set(0, 0.25 + (i * 0.5), -1.25 - (i * 1.25));
            step.castShadow = true;
            step.receiveShadow = true;
            scene.add(step);
        }

        // 경사로
        const rampGeo = new THREE.BoxGeometry(2, 5.4, 0.1);
        const rampAngle = -Math.PI / 2 + Math.atan(2 / 5);
        
        const leftRamp = new THREE.Mesh(rampGeo, matRamp);
        leftRamp.position.set(-3, 1, -3.1);
        leftRamp.rotation.x = rampAngle;
        leftRamp.receiveShadow = true;
        scene.add(leftRamp);

        const rightRamp = new THREE.Mesh(rampGeo, matRamp);
        rightRamp.position.set(3, 1, -3.1);
        rightRamp.rotation.x = rampAngle;
        rightRamp.receiveShadow = true;
        scene.add(rightRamp);

        // 4. 실내 공간 구축
        const wallLeft = new THREE.Mesh(new THREE.BoxGeometry(0.5, 6, 30), matWall);
        wallLeft.position.set(-4.25, 3, -5);
        wallLeft.receiveShadow = true;
        scene.add(wallLeft);

        const wallRight = new THREE.Mesh(new THREE.BoxGeometry(0.5, 6, 30), matWall);
        wallRight.position.set(4.25, 3, -5);
        wallRight.receiveShadow = true;
        scene.add(wallRight);

        const wallBack = new THREE.Mesh(new THREE.BoxGeometry(9, 6, 0.5), matWall);
        wallBack.position.set(0, 3, 10);
        scene.add(wallBack);

        const ceiling = new THREE.Mesh(new THREE.BoxGeometry(9, 0.5, 30), matCeiling);
        ceiling.position.set(0, 5, -5);
        ceiling.receiveShadow = true;
        scene.add(ceiling);

        // 5. 안전 손잡이 (Handrails) 설치 - 올바른 각도
        const slopeAngle = Math.atan(2 / 5); 
        const railZCenter = -3.1;
        const railLength = 5.6;
        const railGeo = new THREE.BoxGeometry(0.08, 0.08, railLength);
        
        function createRampRail(x, baseY) {
            const rail = new THREE.Mesh(railGeo, matRail);
            rail.position.set(x, baseY + 0.9, railZCenter); 
            rail.rotation.x = slopeAngle; 
            rail.castShadow = true;
            scene.add(rail);

            // 기둥 (Pillars)
            const pillarGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.9);
            const zPositions = [-0.8, -3.1, -5.4]; 
            zPositions.forEach((z) => {
                const progress = Math.abs((z + 0.6) / 5);
                const surfaceY = progress * 2; 
                const pillar = new THREE.Mesh(pillarGeo, matRail);
                pillar.position.set(x, surfaceY + 0.45, z);
                pillar.castShadow = true;
                scene.add(pillar);
            });
        }

        // 우측 경사로 손잡이
        createRampRail(3.9, 1.0);
        createRampRail(2.1, 1.0);
        // 좌측 경사로 손잡이
        createRampRail(-3.9, 1.0);
        createRampRail(-2.1, 1.0);
        // 중앙 계단 손잡이
        createRampRail(1.9, 1.0);
        createRampRail(-1.9, 1.0);

        // 6. Pointer Lock & Audio Setup
        let pitch = 0; 
        let yaw = 0;   
        let isPointerLocked = false;
        let audioCtx = null;
        const startScreen = document.getElementById('start-screen');
        const lockIndicator = document.getElementById('lock-indicator');

        function playClickSound() {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            try {
                const now = audioCtx.currentTime;
                
                const osc1 = audioCtx.createOscillator();
                const gain1 = audioCtx.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(1600, now);
                osc1.frequency.exponentialRampToValueAtTime(1000, now + 0.03);
                gain1.gain.setValueAtTime(0.15, now);
                gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.03);
                osc1.connect(gain1);
                gain1.connect(audioCtx.destination);
                osc1.start(now);
                osc1.stop(now + 0.04);

                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                const delay = 0.04;
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(1100, now + delay);
                osc2.frequency.exponentialRampToValueAtTime(400, now + delay + 0.05);
                gain2.gain.setValueAtTime(0.12, now + delay);
                gain2.gain.exponentialRampToValueAtTime(0.001, now + delay + 0.05);
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc2.start(now + delay);
                osc2.stop(now + delay + 0.06);
            } catch(e) {}
        }

        function playUnlockSound() {
            if (!audioCtx) return;
            try {
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(1400, now + 0.15);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now);
                osc.stop(now + 0.15);
            } catch(e) {}
        }

        startScreen.addEventListener('click', () => {
            startScreen.style.display = 'none';
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            try { document.body.requestPointerLock(); } catch (e) {}
        });

        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === document.body) {
                isPointerLocked = true;
                startScreen.style.display = 'none';
            } else {
                isPointerLocked = false;
                startScreen.style.display = 'flex';
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (isPointerLocked) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, pitch));
                camera.rotation.set(pitch, yaw, 0);
            }
        });

        // 7. 키보드 및 물리 엔진 로직
        const keys = { w: false, a: false, s: false, d: false, ' ': false };
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if(keys.hasOwnProperty(key)) keys[key] = true;
        });
        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if(keys.hasOwnProperty(key)) keys[key] = false;
        });

        const baseSpeed = 0.06;
        const totalSteps = 10; 
        
        let lockTimer = 0;      
        let lastStep = -1;      
        let isSlidingDown = false;
        let slideSpeed = 0;
        const gravity = 0.004;       
        const maxSlideSpeed = 0.14;  

        function animate() {
            requestAnimationFrame(animate);

            let moveX = 0;
            let moveZ = 0;
            let currentSpeed = baseSpeed;

            if (keys[' '] && !isSlidingDown && (camera.position.z < -0.6 && camera.position.z > -5.6)) {
                isSlidingDown = true;
                slideSpeed = 0.01; 
                playUnlockSound();
            }

            if (isSlidingDown) {
                slideSpeed = Math.min(maxSlideSpeed, slideSpeed + gravity);
                let nextZ = camera.position.z + slideSpeed;
                
                let progress = Math.abs((nextZ + 0.6) / 5);
                let targetY = 1.2 + (progress * 2);

                if (nextZ >= -0.6) {
                    nextZ = -0.6;
                    targetY = 1.2;
                    isSlidingDown = false;
                    slideSpeed = 0;
                    lockIndicator.style.display = 'none';
                } else {
                    lockIndicator.style.display = 'block';
                    lockIndicator.innerHTML = '🔓 잠금장치 해제! 미끄러지는 중...';
                    lockIndicator.style.backgroundColor = 'rgba(40, 167, 69, 0.9)'; 
                }

                camera.position.z = nextZ;
                camera.position.y = targetY;

            } else {
                if (lockTimer > 0) {
                    currentSpeed = 0; 
                    lockTimer--;
                    lockIndicator.style.display = 'block';
                    lockIndicator.innerHTML = '🔒 안전 고정장치 체결됨 (미끄럼 방지)';
                    lockIndicator.style.backgroundColor = 'rgba(220, 53, 69, 0.9)'; 
                } else {
                    lockIndicator.style.display = 'none';
                }

                if (keys.w) moveZ -= currentSpeed;
                if (keys.s) moveZ += currentSpeed;
                if (keys.a) moveX -= currentSpeed;
                if (keys.d) moveX += currentSpeed;

                const dir = new THREE.Vector3(moveX, 0, moveZ);
                dir.applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);

                let nextX = camera.position.x + dir.x;
                let nextZ = camera.position.z + dir.z;

                if (nextX < -3.8) nextX = -3.8;
                if (nextX > 3.8) nextX = 3.8;
                if (nextZ > 9.5) nextZ = 9.5; 
                if (nextZ < -19.5) nextZ = -19.5; 

                let canMove = true;
                let targetY = 1.2;

                if (nextZ < -0.6 && nextZ > -5.6) {
                    let progress = Math.abs((nextZ + 0.6) / 5);
                    let currentStep = Math.floor(progress * totalSteps);

                    if (nextX >= 2 && nextX <= 4) {
                        if (nextZ > camera.position.z) {
                            canMove = false; 
                        } else {
                            const steppedProgress = Math.floor(progress * totalSteps) / totalSteps;
                            targetY = 1.2 + (steppedProgress * 2);

                            if (currentStep !== lastStep) {
                                if (lastStep !== -1 && currentStep > lastStep) {
                                    lockTimer = 35; 
                                    playClickSound();
                                }
                                lastStep = currentStep;
                            }
                        }
                    } 
                    else if (nextX <= -2 && nextX >= -4) {
                        if (nextZ < camera.position.z) {
                            canMove = false; 
                        } else {
                            const steppedProgress = Math.floor(progress * totalSteps) / totalSteps;
                            targetY = 1.2 + (steppedProgress * 2);

                            if (currentStep !== lastStep) {
                                if (lastStep !== -1 && currentStep < lastStep) {
                                    lockTimer = 35; 
                                    playClickSound();
                                }
                                lastStep = currentStep;
                            }
                        }
                    } 
                    else if (nextX > -2 && nextX < 2) {
                        canMove = false; 
                    } else {
                        canMove = false; 
                    }
                } else {
                    lastStep = -1;
                    if (nextZ <= -5.6) {
                        targetY = 1.2 + 2; 
                    }
                }

                if (canMove) {
                    camera.position.x = nextX;
                    camera.position.z = nextZ;
                    camera.position.y = targetY;
                }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
